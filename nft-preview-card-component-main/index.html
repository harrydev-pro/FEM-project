<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | NFT preview card component</title>
<link rel="stylesheet" href="style.css">
  
</head>
<body>
<div class="card">
  <img class="equilibrium" src="./images/image-equilibrium.jpg" alt="Equilibrium">
  <h1>Equilibrium #3429</h1>
  <p class="description">Our Equilibrium collection promotes balance and calm.</p>
  <div class="price">
  <div class="eth">
    <img src="./images/icon-ethereum.svg" alt="Ethereum" class="ethereum">
    <p>0.041 ETH</p> 
  </div>
  <div class="time">
    <img src="./images/icon-clock.svg" alt="Clock" class="clock">
    <p>3 days left</p>
  </div>
  </div>
  
  <div class="creator">
    <img src="./images/image-avatar.png" alt="Jules Wyvern" class="avatar">
    <p>Creation of <span class="name">Jules Wyvern</span></p>
  </div>







</div>
</body>
</html>
